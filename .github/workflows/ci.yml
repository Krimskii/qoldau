name: CI

on:
  push:
    branches: [feature/**, main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (apps/prototype)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/prototype
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/prototype/package-lock.json
      # Use `npm install` instead of `npm ci`: lock contains platform-specific
      # esbuild/rollup optional deps with "extraneous: true" markers. `npm ci`
      # installs them all (fails on wrong platform, npm/cli#4828); `npm install`
      # correctly skips platform-mismatched optionals.
      - run: npm install --no-audit --no-fund --prefer-offline
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: apps/prototype/dist
          retention-days: 7

  backend:
    name: Backend (apps/api)
    runs-on: ubuntu-latest
    # Phase 1: SQLite в dev/demo (см. apps/api/prisma/schema.prisma).
    # Phase 2: переключить schema на postgresql + вернуть postgres service.
    env:
      DATABASE_URL: file:./prisma/test.db
      JWT_SECRET: test-secret-ci
      NODE_ENV: test
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  matrix:
    name: Node ${{ matrix.node }} (backend typecheck)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['20', '22']
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm ci
      - run: npm run typecheck