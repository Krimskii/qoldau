name: CI

on:
  push:
    branches: [feature/**, main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (apps/prototype)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/prototype
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/prototype/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: apps/prototype/dist
          retention-days: 7

  backend:
    name: Backend (apps/api)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: qoldau
          POSTGRES_PASSWORD: qoldau
          POSTGRES_DB: qoldau_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U qoldau"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://qoldau:qoldau@localhost:5432/qoldau_test
      JWT_SECRET: test-secret-ci
      NODE_ENV: test
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  matrix:
    name: Node ${{ matrix.node }} (backend typecheck)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['20', '22']
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm ci
      - run: npm run typecheck